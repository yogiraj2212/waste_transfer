<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Waste Segregation App</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    padding:0;
    font-family:'Poppins',sans-serif;
    height:100vh;
    background:linear-gradient(120deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:#fff;
    width:420px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
    text-align:center;
}

.card h2{
    margin-bottom:10px;
    color:#1e3c72;
}

.subtitle{
    color:#555;
    margin-bottom:20px;
}

.upload-box{
    border:2px dashed #2a5298;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

input[type="file"]{
    width:100%;
}

button{
    background:#1e3c72;
    color:white;
    border:none;
    padding:12px;
    width:100%;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#16305a;
}

.result{
    margin-top:20px;
    font-size:20px;
    font-weight:600;
    color:#2a5298;
}

.footer{
    margin-top:15px;
    font-size:12px;
    color:gray;
}
</style>
</head>

<body>

<div class="card">

<h2>♻ Waste Segregation AI</h2>
<p class="subtitle">Upload image to classify Plastic / Metal / Paper</p>

<form method="post" enctype="multipart/form-data">

<div class="upload-box">
<input type="file" name="image" required>
</div>

<button type="submit">Predict Waste Type</button>

</form>

{% if prediction %}
<div class="result">
Prediction : {{prediction}}
</div>
{% endif %}

<div class="footer">
Powered by Deep Learning
</div>

</div>

</body>
</html>
